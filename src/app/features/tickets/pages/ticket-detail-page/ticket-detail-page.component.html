<section class="page-card p-4">
  @if (errorMessage()) {
    <div class="row mb-3">
      <div class="col-12">
        <p-message severity="error" [text]="errorMessage() ?? ''"></p-message>
      </div>
    </div>
  }

  @if (currentTicket(); as currentTicket) {
    <app-ticket-detail-header [ticket]="currentTicket"></app-ticket-detail-header>
    <app-ticket-summary-cards [ticket]="currentTicket"></app-ticket-summary-cards>

    <p-tabs value="comments">
      <p-tablist>
        <p-tab value="comments">Comentarios</p-tab>
        @if (canReadHistory()) {
          <p-tab value="history">Historial</p-tab>
        }
        <p-tab value="details">Detalle</p-tab>
      </p-tablist>
      <p-tabpanels>
        <p-tabpanel value="comments">
          <app-ticket-comments-panel></app-ticket-comments-panel>
        </p-tabpanel>

        @if (canReadHistory()) {
          <p-tabpanel value="history">
            <app-ticket-history-panel></app-ticket-history-panel>
          </p-tabpanel>
        }

        <p-tabpanel value="details">
          <app-ticket-detail-overview [ticket]="currentTicket"></app-ticket-detail-overview>
        </p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  } @else if (loading()) {
    <p class="mb-0 ticket-detail-muted">Cargando ticket...</p>
  } @else if (!errorMessage()) {
    <p class="mb-0 ticket-detail-muted">No hay informacion del ticket disponible.</p>
  }
</section>
