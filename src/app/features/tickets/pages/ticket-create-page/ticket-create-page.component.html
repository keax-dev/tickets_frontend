<section class="page-card p-4">
  <div class="row mb-4">
    <div class="col-12">
      <h1 class="mb-2">Nuevo ticket</h1>
      <p class="mb-0 ticket-create-muted">
        Registra una nueva solicitud para el equipo de soporte.
      </p>
    </div>
  </div>

  <form [formGroup]="ticketForm" (ngSubmit)="submit()" class="d-flex flex-column gap-3">
    <label class="d-flex flex-column gap-2">
      <span class="ticket-create-muted">Título</span>
      <input class="w-100" data-testid="ticket-title-input" pInputText formControlName="title" />
    </label>

    <label class="d-flex flex-column gap-2">
      <span class="ticket-create-muted">Descripción</span>
      <textarea
        data-testid="ticket-description-input"
        pTextarea
        formControlName="description"
        rows="7"
      ></textarea>
    </label>

    <div class="row g-3">
      <div class="col-12 col-md-6">
        <label class="d-flex flex-column gap-2">
          <span class="ticket-create-muted">Categoría</span>
          <p-select
            [disabled]="categories().length === 0"
            [options]="categories()"
            data-testid="ticket-category-select"
            formControlName="categoryId"
            optionLabel="name"
            optionValue="id"
            styleClass="w-100"
          ></p-select>
        </label>
      </div>

      <div class="col-12 col-md-6">
        <label class="d-flex flex-column gap-2">
          <span class="ticket-create-muted">Prioridad</span>
          <p-select
            [options]="priorityOptions"
            data-testid="ticket-priority-select"
            formControlName="priority"
            optionLabel="label"
            optionValue="value"
            styleClass="w-100"
          ></p-select>
        </label>
      </div>
    </div>

    @if (categoryErrorMessage()) {
      <p-message severity="warn" [text]="categoryErrorMessage() ?? ''"></p-message>
    }

    @if (errorMessage()) {
      <p-message severity="error" [text]="errorMessage() ?? ''"></p-message>
    }

    <div class="d-flex justify-content-end">
      <button
        [disabled]="categories().length === 0"
        [loading]="submitting()"
        data-testid="ticket-submit-button"
        label="Crear ticket"
        type="submit"
        pButton
      ></button>
    </div>
  </form>
</section>
