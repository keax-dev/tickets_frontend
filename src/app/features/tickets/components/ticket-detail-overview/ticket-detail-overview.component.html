<p class="mb-0">{{ ticket().description }}</p>

@if (ticket().resolutionSummary) {
  <h3 class="mt-4 mb-2">Resolution summary</h3>
  <p class="mb-0">{{ ticket().resolutionSummary }}</p>
}

@if (canRequestInformation()) {
  <form
    (ngSubmit)="requestInformation()"
    [formGroup]="requestInformationForm"
    class="d-flex flex-column gap-3 mt-4"
  >
    <textarea
      formControlName="content"
      placeholder="What information is missing?"
      rows="3"
      pTextarea
    ></textarea>
    <div class="d-flex flex-wrap gap-2">
      <button severity="secondary" label="Request information" type="submit" pButton></button>
    </div>
  </form>
}

@if (canResolve()) {
  <form (ngSubmit)="resolve()" [formGroup]="resolveForm" class="d-flex flex-column gap-3 mt-4">
    <textarea
      formControlName="resolutionSummary"
      placeholder="Resolution summary"
      rows="4"
      pTextarea
    ></textarea>
    <div class="d-flex flex-wrap gap-2">
      <button pButton type="submit" label="Resolve ticket"></button>
    </div>
  </form>
}
