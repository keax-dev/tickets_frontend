<p class="mb-0">{{ ticket().description }}</p>

@if (ticket().resolutionSummary) {
  <h3 class="mt-4 mb-2">Resumen de solucion</h3>
  <p class="mb-0">{{ ticket().resolutionSummary }}</p>
}

@if (canRequestInformation()) {
  <form
    (ngSubmit)="requestInformation()"
    [formGroup]="requestInformationForm"
    class="d-flex flex-column gap-3 mt-4"
  >
    <textarea
      formControlName="content"
      placeholder="Que informacion falta"
      rows="3"
      pTextarea
    ></textarea>
    <div class="d-flex flex-wrap gap-2">
      <button
        severity="secondary"
        label="Solicitar informacion"
        type="submit"
        pButton
      ></button>
    </div>
  </form>
}

@if (canResolve()) {
  <form (ngSubmit)="resolve()" [formGroup]="resolveForm" class="d-flex flex-column gap-3 mt-4">
    <textarea
      formControlName="resolutionSummary"
      placeholder="Resumen de solucion"
      rows="4"
      pTextarea
    ></textarea>
    <div class="d-flex flex-wrap gap-2">
      <button pButton type="submit" label="Resolver ticket"></button>
    </div>
  </form>
}
