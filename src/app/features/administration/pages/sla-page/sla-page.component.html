<section class="container-fluid page-card p-4">
  <div class="row g-3 align-items-start mb-4">
    <div class="col-12 col-md">
      <h1 class="mb-2">SLA</h1>
      <p class="mb-0 sla-muted">
        Define target windows by priority for first response and resolution.
      </p>
    </div>
    <div class="col-12 col-md-auto">
      <button
        (click)="loadPolicies()"
        severity="secondary"
        label="Refresh"
        icon="pi pi-refresh"
        type="button"
        pButton
      ></button>
    </div>
  </div>

  @if (errorMessage()) {
    <div class="row mb-3">
      <div class="col-12">
        <p-message severity="error" [text]="errorMessage() ?? ''"></p-message>
      </div>
    </div>
  }

  <div class="row gx-4 gy-3">
    <div class="col-12 col-md-8">
      <p-card>
        <p-table
          #slaTable
          [showCurrentPageReport]="true"
          [rowsPerPageOptions]="[10, 25, 50, 100]"
          [globalFilterFields]="[
            'priorityDisplay',
            'firstResponseHours',
            'resolutionHours',
            'activeDisplay',
          ]"
          [paginator]="true"
          [loading]="loading()"
          [value]="policyRows()"
          [rows]="10"
          currentPageReportTemplate="{first} - {last} of {totalRecords}"
        >
          <ng-template pTemplate="caption">
            <div class="table-toolbar">
              <span class="table-search">
                <i class="pi pi-search" aria-hidden="true"></i>
                <input
                  (input)="onGlobalFilter(slaTable, $event)"
                  aria-label="Search SLA policies"
                  placeholder="Search SLA policies"
                  type="search"
                  pInputText
                />
              </span>
            </div>
          </ng-template>

          <ng-template pTemplate="header">
            <tr>
              <th pSortableColumn="priorityDisplay">
                <span class="sortable-header">
                  Priority <p-sortIcon field="priorityDisplay"></p-sortIcon>
                </span>
              </th>
              <th pSortableColumn="firstResponseHours">
                <span class="sortable-header">
                  First response <p-sortIcon field="firstResponseHours"></p-sortIcon>
                </span>
              </th>
              <th pSortableColumn="resolutionHours">
                <span class="sortable-header">
                  Resolution <p-sortIcon field="resolutionHours"></p-sortIcon>
                </span>
              </th>
              <th pSortableColumn="activeDisplay">
                <span class="sortable-header">
                  Status <p-sortIcon field="activeDisplay"></p-sortIcon>
                </span>
              </th>
              <th class="actions-column">Actions</th>
            </tr>
          </ng-template>

          <ng-template pTemplate="body" let-policy>
            <tr>
              <td>
                <p-tag
                  [severity]="prioritySeverity(policy.priority)"
                  [value]="policy.priorityDisplay"
                ></p-tag>
              </td>
              <td>{{ policy.firstResponseHours }} h</td>
              <td>{{ policy.resolutionHours }} h</td>
              <td>
                <p-tag
                  [severity]="policy.active ? 'success' : 'secondary'"
                  [value]="policy.activeDisplay"
                ></p-tag>
              </td>
              <td class="d-flex flex-wrap gap-2">
                <button
                  (click)="selectPolicy(policy)"
                  severity="secondary"
                  label="Edit"
                  type="button"
                  size="small"
                  pButton
                ></button>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </p-card>
    </div>

    <div class="col-12 col-md-4">
      <p-card header="Edit policy" class="h-100">
        <form [formGroup]="slaForm" (ngSubmit)="submit()" class="d-flex flex-column gap-3">
          <label class="d-flex flex-column gap-2">
            <span class="sla-muted">Priority</span>
            <p-select
              [options]="priorityOptions"
              formControlName="priority"
              optionLabel="label"
              optionValue="value"
            ></p-select>
          </label>

          <label class="d-flex flex-column gap-2">
            <span class="sla-muted">First response (hours)</span>
            <input pInputText type="number" min="1" formControlName="firstResponseHours" />
          </label>

          <label class="d-flex flex-column gap-2">
            <span class="sla-muted">Resolution (hours)</span>
            <input pInputText type="number" min="1" formControlName="resolutionHours" />
          </label>

          <label class="d-flex flex-column gap-2">
            <span class="sla-muted">Status</span>
            <p-select
              [options]="activeOptions"
              formControlName="active"
              optionValue="value"
              optionLabel="label"
            ></p-select>
          </label>

          <div class="d-flex flex-wrap gap-2">
            <button pButton type="submit" label="Save SLA" [loading]="saving()"></button>
          </div>
        </form>
      </p-card>
    </div>
  </div>
</section>
