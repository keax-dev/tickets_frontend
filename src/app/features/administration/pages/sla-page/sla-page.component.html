<section class="container-fluid page-card p-4">
  <div class="row g-3 align-items-start mb-4">
    <div class="col-12 col-md">
      <h1 class="mb-2">SLA</h1>
      <p class="mb-0 sla-muted">
        Define ventanas objetivo por prioridad para primera respuesta y resolucion.
      </p>
    </div>
    <div class="col-12 col-md-auto">
      <button
        (click)="loadPolicies()"
        severity="secondary"
        label="Recargar"
        icon="pi pi-refresh"
        type="button"
        pButton
      ></button>
    </div>
  </div>

  @if (errorMessage()) {
    <div class="row mb-3">
      <div class="col-12">
        <p-message severity="error" [text]="errorMessage() ?? ''"></p-message>
      </div>
    </div>
  }

  <div class="row gx-4 gy-3">
    <div class="col-12 col-md-8">
      <p-card>
        <p-table
          [showCurrentPageReport]="true"
          [rowsPerPageOptions]="[10, 25, 50, 100]"
          [paginator]="true"
          [loading]="loading()"
          [value]="policies()"
          [rows]="10"
          currentPageReportTemplate="{first} - {last} de {totalRecords}"
        >
          <ng-template pTemplate="header">
            <tr>
              <th>Prioridad</th>
              <th>Primera respuesta</th>
              <th>Resolucion</th>
              <th>Estado</th>
              <th class="actions-column">Acciones</th>
            </tr>
          </ng-template>

          <ng-template pTemplate="body" let-policy>
            <tr>
              <td>
                <p-tag
                  [severity]="prioritySeverity(policy.priority)"
                  [value]="priorityLabel(policy.priority)"
                ></p-tag>
              </td>
              <td>{{ policy.firstResponseHours }} h</td>
              <td>{{ policy.resolutionHours }} h</td>
              <td>
                <p-tag
                  [severity]="policy.active ? 'success' : 'secondary'"
                  [value]="policy.active ? 'Activa' : 'Inactiva'"
                ></p-tag>
              </td>
              <td class="d-flex flex-wrap gap-2">
                <button
                  (click)="selectPolicy(policy)"
                  severity="secondary"
                  label="Editar"
                  type="button"
                  size="small"
                  pButton
                ></button>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </p-card>
    </div>

    <div class="col-12 col-md-4">
      <p-card header="Editar politica" class="h-100">
        <form [formGroup]="slaForm" (ngSubmit)="submit()" class="d-flex flex-column gap-3">
          <label class="d-flex flex-column gap-2">
            <span class="sla-muted">Prioridad</span>
            <p-select
              [options]="priorityOptions"
              formControlName="priority"
              optionLabel="label"
              optionValue="value"
            ></p-select>
          </label>

          <label class="d-flex flex-column gap-2">
            <span class="sla-muted">Primera respuesta (horas)</span>
            <input pInputText type="number" min="1" formControlName="firstResponseHours" />
          </label>

          <label class="d-flex flex-column gap-2">
            <span class="sla-muted">Resolucion (horas)</span>
            <input pInputText type="number" min="1" formControlName="resolutionHours" />
          </label>

          <label class="d-flex flex-column gap-2">
            <span class="sla-muted">Estado</span>
            <p-select
              [options]="activeOptions"
              formControlName="active"
              optionValue="value"
              optionLabel="label"
            ></p-select>
          </label>

          <div class="d-flex flex-wrap gap-2">
            <button pButton type="submit" label="Guardar SLA" [loading]="saving()"></button>
          </div>
        </form>
      </p-card>
    </div>
  </div>
</section>
