<section class="container-fluid page-card p-4">
  <div class="row g-3 align-items-start mb-4">
    <div class="col-12 col-md">
      <h1 class="mb-2">Users</h1>
      <p class="mb-0 users-muted">Create, update, and deactivate operational user accounts.</p>
    </div>
    <div class="col-12 col-md-auto">
      <div class="d-flex flex-wrap justify-content-center justify-content-md-end gap-2">
        <button
          (click)="startCreate()"
          type="button"
          label="New user"
          icon="pi pi-plus"
          pButton
        ></button>
        <button
          (click)="loadUsers()"
          severity="secondary"
          label="Refresh"
          icon="pi pi-refresh"
          type="button"
          pButton
        ></button>
      </div>
    </div>
  </div>

  @if (errorMessage()) {
    <div class="row mb-3">
      <div class="col-12">
        <p-message severity="error" [text]="errorMessage() ?? ''"></p-message>
      </div>
    </div>
  }

  <div class="row gx-4 gy-3">
    <div class="col-12 col-md-8">
      <p-card class="h-100">
        <p-table
          [showCurrentPageReport]="true"
          [rowsPerPageOptions]="[10, 25, 50, 100]"
          [loading]="loading()"
          [paginator]="true"
          [value]="users()"
          [rows]="10"
          currentPageReportTemplate="{first} - {last} of {totalRecords}"
        >
          <ng-template pTemplate="header">
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th class="actions-column">Actions</th>
            </tr>
          </ng-template>

          <ng-template pTemplate="body" let-user>
            <tr>
              <td>{{ user.firstName }} {{ user.lastName }}</td>
              <td>{{ user.email }}</td>
              <td><p-tag [value]="roleLabel(user.role)" severity="info"></p-tag></td>
              <td>
                <p-tag
                  [severity]="user.active ? 'success' : 'secondary'"
                  [value]="activeStateLabel(user.active)"
                ></p-tag>
              </td>
              <td class="d-flex flex-wrap gap-2">
                <button
                  (click)="editUser(user)"
                  severity="secondary"
                  label="Edit"
                  size="small"
                  type="button"
                  pButton
                ></button>
                <button
                  (click)="toggleStatus(user)"
                  [severity]="user.active ? 'danger' : 'success'"
                  [label]="activationActionLabel(user.active)"
                  type="button"
                  size="small"
                  pButton
                ></button>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </p-card>
    </div>

    <div class="col-12 col-md-4">
      <p-card [header]="isEditing() ? 'Edit user' : 'Create user'" class="h-100">
        <form (ngSubmit)="submit()" [formGroup]="userForm" class="d-flex flex-column gap-3">
          <label class="d-flex flex-column gap-2">
            <span class="users-muted">First name</span>
            <input pInputText formControlName="firstName" />
          </label>

          <label class="d-flex flex-column gap-2">
            <span class="users-muted">Last name</span>
            <input pInputText formControlName="lastName" />
          </label>

          <label class="d-flex flex-column gap-2">
            <span class="users-muted">Email</span>
            <input pInputText type="email" formControlName="email" />
          </label>

          <label class="d-flex flex-column gap-2">
            <span class="users-muted">Role</span>
            <p-select
              [options]="roleOptions"
              formControlName="role"
              optionLabel="label"
              optionValue="value"
            ></p-select>
          </label>

          @if (!isEditing()) {
            <label class="d-flex flex-column gap-2">
              <span class="users-muted">Initial password</span>
              <p-password
                [toggleMask]="true"
                [feedback]="false"
                formControlName="password"
              ></p-password>
            </label>
          } @else {
            <p class="mb-0 users-muted">Editing keeps the user's current password unchanged.</p>
          }

          <div class="d-flex flex-wrap gap-2">
            <button
              [loading]="saving()"
              [label]="isEditing() ? 'Save changes' : 'Create user'"
              type="submit"
              pButton
            ></button>
            <button
              (click)="startCreate()"
              severity="secondary"
              label="Clear"
              type="button"
              pButton
            ></button>
          </div>
        </form>
      </p-card>
    </div>
  </div>
</section>
