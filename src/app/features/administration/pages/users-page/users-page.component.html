<section class="container-fluid page-card p-4">
  <div class="row g-3 align-items-start mb-4">
    <div class="col-12 col-md">
      <h1 class="mb-2">Usuarios</h1>
      <p class="mb-0 users-muted">Crea, actualiza y desactiva cuentas operativas.</p>
    </div>
    <div class="col-12 col-md-auto">
      <div class="d-flex flex-wrap justify-content-center justify-content-md-end gap-2">
        <button
          (click)="startCreate()"
          type="button"
          label="Nuevo usuario"
          icon="pi pi-plus"
          pButton
        ></button>
        <button
          (click)="loadUsers()"
          severity="secondary"
          label="Actualizar"
          icon="pi pi-refresh"
          type="button"
          pButton
        ></button>
      </div>
    </div>
  </div>

  @if (errorMessage()) {
    <div class="row mb-3">
      <div class="col-12">
        <p-message severity="error" [text]="errorMessage() ?? ''"></p-message>
      </div>
    </div>
  }

  <div class="row gx-4 gy-3">
    <div class="col-12 col-md-8">
      <p-card class="h-100">
        <p-table
          #usersTable
          [showCurrentPageReport]="true"
          [rowsPerPageOptions]="[10, 25, 50, 100]"
          [globalFilterFields]="['fullName', 'email', 'roleDisplay', 'activeDisplay']"
          [loading]="loading()"
          [paginator]="true"
          [value]="userRows()"
          [rows]="10"
          currentPageReportTemplate="{first} - {last} de {totalRecords}"
        >
          <ng-template pTemplate="caption">
            <div class="table-toolbar">
              <span class="table-search">
                <i class="pi pi-search" aria-hidden="true"></i>
                <input
                  (input)="onGlobalFilter(usersTable, $event)"
                  aria-label="Buscar usuarios"
                  placeholder="Buscar usuarios"
                  type="search"
                  pInputText
                />
              </span>
            </div>
          </ng-template>

          <ng-template pTemplate="header">
            <tr>
              <th pSortableColumn="fullName">
                <span class="sortable-header"
                  >Nombre <p-sortIcon field="fullName"></p-sortIcon
                ></span>
              </th>
              <th pSortableColumn="email">
                <span class="sortable-header">
                  Correo electrónico <p-sortIcon field="email"></p-sortIcon>
                </span>
              </th>
              <th pSortableColumn="roleDisplay">
                <span class="sortable-header"
                  >Rol <p-sortIcon field="roleDisplay"></p-sortIcon
                ></span>
              </th>
              <th pSortableColumn="activeDisplay">
                <span class="sortable-header">
                  Estado <p-sortIcon field="activeDisplay"></p-sortIcon>
                </span>
              </th>
              <th class="actions-column">Acciones</th>
            </tr>
          </ng-template>

          <ng-template pTemplate="body" let-user>
            <tr>
              <td>{{ user.fullName }}</td>
              <td>{{ user.email }}</td>
              <td><p-tag [value]="user.roleDisplay" severity="info"></p-tag></td>
              <td>
                <p-tag
                  [severity]="user.active ? 'success' : 'secondary'"
                  [value]="user.activeDisplay"
                ></p-tag>
              </td>
              <td class="d-flex flex-wrap gap-2">
                <button
                  (click)="editUser(user)"
                  severity="secondary"
                  label="Editar"
                  size="small"
                  type="button"
                  pButton
                ></button>
                <button
                  (click)="toggleStatus(user)"
                  [severity]="user.active ? 'danger' : 'success'"
                  [label]="activationActionLabel(user.active)"
                  type="button"
                  size="small"
                  pButton
                ></button>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </p-card>
    </div>

    <div class="col-12 col-md-4">
      <p-card [header]="isEditing() ? 'Editar usuario' : 'Crear usuario'" class="h-100">
        <form (ngSubmit)="submit()" [formGroup]="userForm" class="d-flex flex-column gap-3">
          <label class="d-flex flex-column gap-2">
            <span class="users-muted">Nombre</span>
            <input pInputText formControlName="firstName" />
          </label>

          <label class="d-flex flex-column gap-2">
            <span class="users-muted">Apellido</span>
            <input pInputText formControlName="lastName" />
          </label>

          <label class="d-flex flex-column gap-2">
            <span class="users-muted">Correo electrónico</span>
            <input pInputText type="email" formControlName="email" />
          </label>

          <label class="d-flex flex-column gap-2">
            <span class="users-muted">Rol</span>
            <p-select
              [options]="roleOptions"
              formControlName="role"
              optionLabel="label"
              optionValue="value"
            ></p-select>
          </label>

          @if (!isEditing()) {
            <label class="d-flex flex-column gap-2">
              <span class="users-muted">Contraseña inicial</span>
              <p-password
                [toggleMask]="true"
                [feedback]="false"
                formControlName="password"
              ></p-password>
            </label>
          } @else {
            <p class="mb-0 users-muted">
              Al editar, la contraseña actual del usuario se mantiene sin cambios.
            </p>
          }

          <div class="d-flex flex-wrap gap-2">
            <button
              [loading]="saving()"
              [label]="isEditing() ? 'Guardar cambios' : 'Crear usuario'"
              type="submit"
              pButton
            ></button>
            <button
              (click)="startCreate()"
              severity="secondary"
              label="Limpiar"
              type="button"
              pButton
            ></button>
          </div>
        </form>
      </p-card>
    </div>
  </div>
</section>
