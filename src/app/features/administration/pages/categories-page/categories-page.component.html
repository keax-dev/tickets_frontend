<section class="page-card p-4">
  <div class="row g-3 align-items-start mb-4">
    <div class="col-12 col-md">
      <h1 class="mb-2">Categories</h1>
      <p class="mb-0 categories-muted">
        Maintain the category catalog that classifies tickets and supports SLA rules.
      </p>
    </div>
    <div class="col-12 col-md-auto">
      <div class="d-flex flex-wrap justify-content-center justify-content-md-end gap-2">
        <button
          (click)="startCreate()"
          label="New category"
          icon="pi pi-plus"
          type="button"
          pButton
        ></button>
        <button
          (click)="loadCategories()"
          severity="secondary"
          label="Refresh"
          type="button"
          icon="pi pi-refresh"
          pButton
        ></button>
      </div>
    </div>
  </div>

  @if (errorMessage()) {
    <div class="row mb-3">
      <div class="col-12">
        <p-message severity="error" [text]="errorMessage() ?? ''"></p-message>
      </div>
    </div>
  }

  <div class="row gx-4 gy-3">
    <div class="col-12 col-md-8">
      <p-card class="h-100">
        <p-table
          [showCurrentPageReport]="true"
          [rowsPerPageOptions]="[10, 25, 50, 100]"
          [paginator]="true"
          [loading]="loading()"
          [value]="categories()"
          [rows]="10"
          currentPageReportTemplate="{first} - {last} of {totalRecords}"
        >
          <ng-template pTemplate="header">
            <tr>
              <th>Name</th>
              <th>Description</th>
              <th>Status</th>
              <th class="actions-column">Actions</th>
            </tr>
          </ng-template>

          <ng-template pTemplate="body" let-category>
            <tr>
              <td>{{ category.name }}</td>
              <td>{{ category.description || 'No description' }}</td>
              <td>
                <p-tag
                  [severity]="category.active ? 'success' : 'secondary'"
                  [value]="activeStateLabel(category.active)"
                ></p-tag>
              </td>
              <td class="d-flex flex-wrap gap-2">
                <button
                  (click)="editCategory(category)"
                  severity="secondary"
                  label="Edit"
                  type="button"
                  size="small"
                  pButton
                ></button>
                <button
                  (click)="toggleStatus(category)"
                  [severity]="category.active ? 'danger' : 'success'"
                  [label]="activationActionLabel(category.active)"
                  type="button"
                  size="small"
                  pButton
                ></button>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </p-card>
    </div>

    <div class="col-12 col-md-4">
      <p-card [header]="isEditing() ? 'Edit category' : 'Create category'">
        <form (ngSubmit)="submit()" [formGroup]="categoryForm" class="d-flex flex-column gap-3">
          <label class="d-flex flex-column gap-2">
            <span class="categories-muted">Name</span>
            <input pInputText formControlName="name" />
          </label>

          <label class="d-flex flex-column gap-2">
            <span class="categories-muted">Description</span>
            <textarea pTextarea formControlName="description" rows="5"></textarea>
          </label>

          <div class="d-flex flex-wrap gap-2">
            <button
              [loading]="saving()"
              [label]="isEditing() ? 'Save changes' : 'Create category'"
              type="submit"
              pButton
            ></button>
            <button
              (click)="startCreate()"
              severity="secondary"
              label="Clear"
              type="button"
              pButton
            ></button>
          </div>
        </form>
      </p-card>
    </div>
  </div>
</section>
