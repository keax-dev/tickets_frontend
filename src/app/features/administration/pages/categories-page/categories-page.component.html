<section class="page-card p-4">
  <div class="row g-3 align-items-start mb-4">
    <div class="col-12 col-md">
      <h1 class="mb-2">Categorías</h1>
      <p class="mb-0 categories-muted">
        Mantén el catálogo de categorías que clasifica tickets y soporta reglas SLA.
      </p>
    </div>
    <div class="col-12 col-md-auto">
      <div class="d-flex flex-wrap justify-content-center justify-content-md-end gap-2">
        <button
          (click)="startCreate()"
          label="Nueva categoría"
          icon="pi pi-plus"
          type="button"
          pButton
        ></button>
        <button
          (click)="loadCategories()"
          severity="secondary"
          label="Actualizar"
          type="button"
          icon="pi pi-refresh"
          pButton
        ></button>
      </div>
    </div>
  </div>

  @if (errorMessage()) {
    <div class="row mb-3">
      <div class="col-12">
        <p-message severity="error" [text]="errorMessage() ?? ''"></p-message>
      </div>
    </div>
  }

  <div class="row gx-4 gy-3">
    <div class="col-12 col-md-8">
      <p-card class="h-100">
        <p-table
          #categoriesTable
          [showCurrentPageReport]="true"
          [rowsPerPageOptions]="[10, 25, 50, 100]"
          [globalFilterFields]="['name', 'descriptionDisplay', 'activeDisplay']"
          [paginator]="true"
          [loading]="loading()"
          [value]="categoryRows()"
          [rows]="10"
          currentPageReportTemplate="{first} - {last} de {totalRecords}"
        >
          <ng-template pTemplate="caption">
            <div class="table-toolbar">
              <span class="table-search">
                <i class="pi pi-search" aria-hidden="true"></i>
                <input
                  (input)="onGlobalFilter(categoriesTable, $event)"
                  aria-label="Buscar categorías"
                  placeholder="Buscar categorías"
                  type="search"
                  pInputText
                />
              </span>
            </div>
          </ng-template>

          <ng-template pTemplate="header">
            <tr>
              <th pSortableColumn="name">
                <span class="sortable-header">Nombre <p-sortIcon field="name"></p-sortIcon></span>
              </th>
              <th pSortableColumn="descriptionDisplay">
                <span class="sortable-header">
                  Descripción <p-sortIcon field="descriptionDisplay"></p-sortIcon>
                </span>
              </th>
              <th pSortableColumn="activeDisplay">
                <span class="sortable-header">
                  Estado <p-sortIcon field="activeDisplay"></p-sortIcon>
                </span>
              </th>
              <th class="actions-column">Acciones</th>
            </tr>
          </ng-template>

          <ng-template pTemplate="body" let-category>
            <tr>
              <td>{{ category.name }}</td>
              <td>{{ category.descriptionDisplay }}</td>
              <td>
                <p-tag
                  [severity]="category.active ? 'success' : 'secondary'"
                  [value]="category.activeDisplay"
                ></p-tag>
              </td>
              <td class="d-flex flex-wrap gap-2">
                <button
                  (click)="editCategory(category)"
                  severity="secondary"
                  label="Editar"
                  type="button"
                  size="small"
                  pButton
                ></button>
                <button
                  (click)="toggleStatus(category)"
                  [severity]="category.active ? 'danger' : 'success'"
                  [label]="activationActionLabel(category.active)"
                  type="button"
                  size="small"
                  pButton
                ></button>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </p-card>
    </div>

    <div class="col-12 col-md-4">
      <p-card [header]="isEditing() ? 'Editar categoría' : 'Crear categoría'">
        <form (ngSubmit)="submit()" [formGroup]="categoryForm" class="d-flex flex-column gap-3">
          <label class="d-flex flex-column gap-2">
            <span class="categories-muted">Nombre</span>
            <input pInputText formControlName="name" />
          </label>

          <label class="d-flex flex-column gap-2">
            <span class="categories-muted">Descripción</span>
            <textarea pTextarea formControlName="description" rows="5"></textarea>
          </label>

          <div class="d-flex flex-wrap gap-2">
            <button
              [loading]="saving()"
              [label]="isEditing() ? 'Guardar cambios' : 'Crear categoría'"
              type="submit"
              pButton
            ></button>
            <button
              (click)="startCreate()"
              severity="secondary"
              label="Limpiar"
              type="button"
              pButton
            ></button>
          </div>
        </form>
      </p-card>
    </div>
  </div>
</section>
