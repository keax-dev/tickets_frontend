<section class="container-fluid page-card p-4">
  <div class="row">
    <div class="col-12">
      <h1>Perfil</h1>
      <p>Información de la sesión actual y permisos efectivos.</p>
    </div>
  </div>

  @if (authStore.currentUser(); as currentUser) {
    <div class="row">
      <div class="col-12 col-md-4">
        <p-card header="Nombre">{{ currentUser.firstName }} {{ currentUser.lastName }}</p-card>
      </div>
      <div class="col-12 col-md-4">
        <p-card header="Correo electrónico">{{ currentUser.email }}</p-card>
      </div>
      <div class="col-12 col-md-4">
        <p-card header="Rol">{{ roleLabel(currentUser.role) }}</p-card>
      </div>
    </div>
  }
</section>
