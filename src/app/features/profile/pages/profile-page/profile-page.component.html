<section class="container-fluid page-card p-4">
  <div class="row">
    <div class="col-12">
      <h1>Profile</h1>
      <p>Current session information and effective permissions.</p>
    </div>
  </div>

  @if (authStore.currentUser(); as currentUser) {
    <div class="row">
      <div class="col-12 col-md-4">
        <p-card header="Name">{{ currentUser.firstName }} {{ currentUser.lastName }}</p-card>
      </div>
      <div class="col-12 col-md-4">
        <p-card header="Email">{{ currentUser.email }}</p-card>
      </div>
      <div class="col-12 col-md-4">
        <p-card header="Role">{{ roleLabel(currentUser.role) }}</p-card>
      </div>
    </div>
  }
</section>
