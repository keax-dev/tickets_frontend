<div class="login-page">
  <div class="hero">
    <p class="eyebrow">Gestión de tickets</p>
    <h1>Administra la operación de soporte desde un solo lugar.</h1>
    <p>Inicia sesión para revisar tickets, prioridades, tiempos SLA y seguimiento operativo.</p>
  </div>

  <p-card styleClass="login-card">
    <ng-template pTemplate="title">
      <span class="login-card-title">Iniciar sesión</span>
    </ng-template>
    <ng-template pTemplate="subtitle">
      <span class="login-card-subtitle">Ingresa tus credenciales para continuar.</span>
    </ng-template>

    <form (ngSubmit)="submit()" [formGroup]="loginForm">
      <label class="field">
        <span>Correo electrónico</span>
        <input
          pInputText
          type="email"
          formControlName="email"
          placeholder="tu@empresa.com"
          autocomplete="username"
        />
      </label>

      <label class="field">
        <span>Contraseña</span>
        <p-password
          [toggleMask]="true"
          [feedback]="false"
          formControlName="password"
          styleClass="w-100"
          inputStyleClass="w-100"
          placeholder="Ingresa tu contraseña"
        />
      </label>

      @if (showValidationError()) {
        <p-message severity="warn" text="Ingresa correo y contraseña para continuar." />
      }

      @if (authStore.errorMessage()) {
        <p-message severity="error" [text]="authStore.errorMessage() ?? ''" />
      }

      <button
        [loading]="authStore.loading()"
        label="Iniciar sesión"
        class="submit-button"
        type="submit"
        pButton
      ></button>
    </form>
  </p-card>
</div>
