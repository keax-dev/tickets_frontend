<div class="login-page">
  <div class="hero">
    <p class="eyebrow">Management Tickets</p>
    <h1>Gestiona la operacion de soporte desde un solo lugar.</h1>
    <p>Accede con tu cuenta para revisar tickets, prioridades, SLA y seguimiento operativo.</p>
  </div>

  <p-card class="login-card">
    <ng-template pTemplate="title">Ingresar</ng-template>
    <ng-template pTemplate="subtitle">Ingresa tus credenciales para continuar.</ng-template>

    <form (ngSubmit)="submit()" [formGroup]="loginForm">
      <label class="field">
        <span>Correo</span>
        <input
          pInputText
          type="email"
          formControlName="email"
          placeholder="tu@empresa.com"
          autocomplete="username"
        />
      </label>

      <label class="field">
        <span>Contrasena</span>
        <p-password
          [toggleMask]="true"
          [feedback]="false"
          formControlName="password"
          inputStyleClass="w-full"
          placeholder="Ingresa tu contrasena"
        />
      </label>

      @if (showValidationError()) {
        <p-message severity="warn" text="Completa correo y contrasena para continuar." />
      }

      @if (authStore.errorMessage()) {
        <p-message severity="error" [text]="authStore.errorMessage() ?? ''" />
      }

      <button
        [loading]="authStore.loading()"
        label="Ingresar"
        class="submit-button"
        type="submit"
        pButton
      ></button>
    </form>
  </p-card>
</div>
