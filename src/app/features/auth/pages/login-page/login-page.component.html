<div class="login-page">
  <div class="hero">
    <p class="eyebrow">Management Tickets</p>
    <h1>Manage support operations from one place.</h1>
    <p>Sign in to review tickets, priorities, SLA windows, and operational follow-up.</p>
  </div>

  <p-card class="login-card">
    <ng-template pTemplate="title">Sign in</ng-template>
    <ng-template pTemplate="subtitle">Enter your credentials to continue.</ng-template>

    <form (ngSubmit)="submit()" [formGroup]="loginForm">
      <label class="field">
        <span>Email</span>
        <input
          pInputText
          type="email"
          formControlName="email"
          placeholder="you@company.com"
          autocomplete="username"
        />
      </label>

      <label class="field">
        <span>Password</span>
        <p-password
          [toggleMask]="true"
          [feedback]="false"
          formControlName="password"
          inputStyleClass="w-full"
          placeholder="Enter your password"
        />
      </label>

      @if (showValidationError()) {
        <p-message severity="warn" text="Enter both email and password to continue." />
      }

      @if (authStore.errorMessage()) {
        <p-message severity="error" [text]="authStore.errorMessage() ?? ''" />
      }

      <button
        [loading]="authStore.loading()"
        label="Sign in"
        class="submit-button"
        type="submit"
        pButton
      ></button>
    </form>
  </p-card>
</div>
