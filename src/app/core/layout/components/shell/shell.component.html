<div class="shell">
  <aside class="sidebar page-card">
    <div>
      <p class="eyebrow">Gestión de tickets</p>
      <h2>Centro de soporte</h2>
      <p class="muted">Administra tickets, comentarios, prioridades y seguimiento operativo.</p>
    </div>

    <nav class="nav">
      @for (item of navigationItems(); track item.path) {
        <a class="nav-link" [routerLink]="item.path" routerLinkActive="nav-link-active">
          <i [class]="item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <p-divider />

    <div class="sidebar-footer">
      <button
        (click)="themeStore.toggle()"
        [label]="themeStore.modeLabel()"
        severity="contrast"
        variant="text"
        icon="pi pi-palette"
        type="button"
        pButton
      ></button>
      <button
        (click)="authStore.logout()"
        data-testid="logout-button"
        severity="danger"
        variant="text"
        label="Cerrar sesión"
        icon="pi pi-sign-out"
        type="button"
        pButton
      ></button>
    </div>
  </aside>

  <div class="content">
    <header class="topbar page-card">
      <div>
        <p class="eyebrow">Sesión activa</p>
        <h1>Hola, {{ authStore.currentUser()?.firstName }}</h1>
      </div>

      <div class="user-pill">
        <a class="notification-link" routerLink="/notifications">
          <i class="pi pi-bell"></i>
        </a>
        <p-avatar [label]="authStore.userInitials()" shape="circle" />
        <div>
          <strong>{{ fullName() }}</strong>
          <small>{{ currentRoleLabel() }}</small>
        </div>
      </div>
    </header>

    <main class="main-view">
      <router-outlet />
    </main>
  </div>
</div>
